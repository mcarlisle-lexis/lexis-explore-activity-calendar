<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexis Travel Discovery — Activity Calendar</title>
<style>
  :root{
    --orange:#E8791A; --dark:#241F1C; --maroon:#8B2E1F; --yellow:#F2B705;
    --bg:#FBF6F0; --card:#FFFFFF; --stripe:#F5E3CC; --grey:#5A5A5A; --line:#E9DCC9;
    --going:#1E7F4F; --going-bg:#E7F5EC; --holiday:#C0392B;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--dark);}
  a{color:inherit;}
  button{font-family:inherit;}

  header.hero{background:linear-gradient(135deg,var(--dark) 0%,#3a2f28 100%);color:#fff;padding:22px 24px 18px;}
  .hero-inner{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;}
  .brand{color:var(--orange);font-weight:800;letter-spacing:1px;font-size:12px;text-transform:uppercase;}
  h1{margin:5px 0 3px;font-size:clamp(20px,2.6vw,28px);}
  .sub{color:#e8d9c8;font-size:13px;}
  .staffToggle{border:1.5px solid #cabba8;background:transparent;color:#f3e9dc;padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .staffToggle.on{background:var(--orange);border-color:var(--orange);color:#fff;}
  .headerBtns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .studentToggle{border:1.5px solid #cabba8;background:transparent;color:#f3e9dc;padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .studentToggle.on{background:var(--going);border-color:var(--going);color:#fff;}
  .loginPrompt{font-size:13.5px;color:var(--dark);line-height:1.55;margin-bottom:16px;}
  .loginPrompt b{color:var(--maroon);}

  .blurbBar{background:#fff7ea;border-bottom:1px solid var(--line);padding:10px 24px;}
  .blurbBar-inner{max-width:1300px;margin:0 auto;font-size:13px;color:var(--dark);line-height:1.55;display:flex;gap:12px;align-items:flex-start;justify-content:space-between;}
  .blurbText{flex:1;}
  .blurbEditBtn{border:1.5px solid var(--line);background:#fff;padding:4px 10px;border-radius:8px;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .blurbEditWrap{flex-direction:column;align-items:stretch;}
  .blurbEditWrap textarea{width:100%;min-height:74px;border:1.5px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:13px;}

  .controlbar{position:sticky;top:0;z-index:60;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(0,0,0,.05);}
  .controlbar-inner{max-width:1300px;margin:0 auto;padding:10px 24px;}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .row + .row{margin-top:9px;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--grey);font-weight:700;margin-right:2px;white-space:nowrap;}

  .chip{border:1.5px solid var(--line);background:#fff;color:var(--dark);padding:6px 13px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s ease;white-space:nowrap;}
  .chip:hover{border-color:var(--orange);}
  .chip.active{background:var(--dark);border-color:var(--dark);color:#fff;}
  .chip .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;position:relative;top:-1px;}

  .viewToggle{display:flex;border:1.5px solid var(--dark);border-radius:999px;overflow:hidden;}
  .viewToggle button{border:none;background:#fff;color:var(--dark);padding:6px 16px;font-size:13px;font-weight:700;cursor:pointer;}
  .viewToggle button.active{background:var(--dark);color:#fff;}

  .navbar{display:flex;align-items:center;gap:10px;}
  .navBtn{border:1.5px solid var(--line);background:#fff;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .navBtn:hover{border-color:var(--orange);}
  .periodLabel{font-weight:800;font-size:15px;min-width:170px;text-align:center;}
  .todayBtn{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;}

  #search{border:1.5px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13px;min-width:180px;flex:1;max-width:260px;font-family:inherit;}
  #search:focus{outline:none;border-color:var(--orange);}
  .toggleBtn{border:1.5px solid var(--going);color:var(--going);background:#fff;padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .toggleBtn.on{background:var(--going);color:#fff;}
  .resultCount{font-size:12px;color:var(--grey);margin-left:auto;white-space:nowrap;}

  .staffBar{background:#2b2118;color:#f3e9dc;display:none;}
  .staffBar.show{display:block;}
  .staffBar-inner{max-width:1300px;margin:0 auto;padding:8px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .staffBar .tag{background:var(--orange);color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px;}
  .sbtn{border:1.5px solid #cabba8;background:transparent;color:#f3e9dc;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
  .sbtn:hover{border-color:var(--orange);}
  .sbtn.primary{background:var(--orange);border-color:var(--orange);color:#fff;}

  main{max-width:1300px;margin:0 auto;padding:14px 24px 80px;}

  .posterBanner{background:var(--stripe);border:1.5px solid var(--orange);border-radius:10px;padding:9px 14px;font-size:12.5px;font-weight:600;margin-bottom:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .posterBanner a{color:var(--maroon);font-weight:800;text-decoration:underline;}

  /* ---------- Week view ---------- */
  .weekGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
  .dayCol{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;min-height:120px;}
  .dayCol.weekend{background:#fffaf2;}
  .dayHead{padding:9px 10px;border-bottom:1px solid var(--line);background:var(--stripe);}
  .dayHead .dname{font-size:11px;font-weight:800;text-transform:uppercase;color:var(--maroon);letter-spacing:.4px;}
  .dayHead .dnum{font-size:17px;font-weight:800;color:var(--dark);}
  .holidayRibbon{font-size:10px;background:var(--holiday);color:#fff;padding:2px 6px;border-radius:5px;display:inline-block;margin-top:3px;font-weight:700;}
  .dayBody{padding:8px;display:flex;flex-direction:column;gap:6px;flex:1;}
  .miniCard{border:1px solid var(--line);border-radius:8px;padding:7px 8px;cursor:pointer;background:#fff;position:relative;}
  .miniCard:hover{border-color:var(--orange);}
  .miniCard .campusTag{font-size:9.5px;font-weight:800;text-transform:uppercase;color:#fff;padding:2px 6px;border-radius:5px;display:inline-block;margin-bottom:4px;}
  .miniCard .mtitle{font-size:12px;font-weight:700;line-height:1.3;color:var(--dark);}
  .miniCard .mtime{font-size:10.5px;color:var(--grey);margin-top:2px;}
  .miniCard.flagship{background:linear-gradient(135deg,#fff 60%,var(--stripe));border-color:var(--orange);}
  .miniCard.attending{outline:2px solid var(--going);}
  .emptyDay{font-size:11px;color:#b8a892;font-style:italic;padding:4px 2px;}

  /* ---------- Month view ---------- */
  .monthHeadRow{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:6px;}
  .monthHeadRow div{text-align:center;font-size:11px;font-weight:800;text-transform:uppercase;color:var(--maroon);letter-spacing:.5px;}
  .monthGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
  .monthCell{background:var(--card);border:1px solid var(--line);border-radius:10px;min-height:132px;padding:6px 7px;display:flex;flex-direction:column;gap:4px;}
  .monthCell.outside{background:#f7f1e8;opacity:.5;}
  .monthCell .cnum{font-size:12px;font-weight:800;color:var(--dark);}
  .chipRow{display:flex;flex-direction:column;gap:3px;overflow:hidden;flex:1;}
  .actChip{background:#fff;border:1px solid var(--line);border-radius:6px;padding:3px 5px;cursor:pointer;display:flex;flex-direction:column;gap:1px;}
  .actChip:hover{border-color:var(--orange);}
  .actChip .chipCampus{font-size:8px;font-weight:800;text-transform:uppercase;color:#fff;padding:1px 5px;border-radius:4px;display:inline-block;width:fit-content;white-space:nowrap;}
  .actChip .chipTitle{font-size:10px;font-weight:700;color:var(--dark);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .actChip.flagship{border-color:var(--orange);background:linear-gradient(135deg,#fff 60%,var(--stripe));}
  .actChip.attending{outline:1.5px solid var(--going);}
  .moreChip{font-size:10px;color:var(--grey);font-weight:700;cursor:pointer;}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(36,31,28,.55);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;cursor:pointer;}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:14px;max-width:580px;width:100%;max-height:88vh;overflow-y:auto;padding:22px;position:relative;cursor:default;}
  .modal h2{margin:0 0 4px;font-size:19px;}
  .modal .detailImgWrap{margin:-22px -22px 12px;position:relative;height:320px;overflow:hidden;border-radius:14px 14px 0 0;background:var(--stripe);}
  @media (max-width:600px){ .modal .detailImgWrap{height:220px;} }
  .modal .detailImgWrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .modal .campusTag{font-size:11px;font-weight:800;text-transform:uppercase;color:#fff;padding:3px 9px;border-radius:999px;display:inline-block;margin-bottom:10px;}
  .modal .catBadge{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--maroon);background:var(--stripe);padding:3px 9px;border-radius:999px;margin:0 0 8px 6px;vertical-align:middle;}
  .modal .meta{font-size:12.5px;color:var(--maroon);font-weight:700;margin-bottom:8px;}
  .modal .blurb{font-size:13px;color:var(--dark);line-height:1.55;margin-bottom:10px;}
  .modal .desc{font-size:13.5px;color:var(--grey);line-height:1.5;margin-bottom:12px;}
  .modal .desc .descLabel{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:#b8a892;margin-bottom:3px;}
  .modal .options{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .modal .opt-link{font-size:11.5px;background:var(--stripe);color:var(--dark);padding:5px 10px;border-radius:8px;text-decoration:none;font-weight:600;}
  .modal .footerRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:12px;}
  .closeX{position:absolute;top:14px;right:16px;border:none;background:none;font-size:20px;cursor:pointer;color:var(--grey);}
  .attend-btn{border:1.5px solid var(--going);color:var(--going);background:#fff;padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:800;cursor:pointer;white-space:nowrap;}
  .attend-btn.on{background:var(--going);color:#fff;}
  .book-link{font-size:11.5px;color:var(--maroon);font-weight:700;text-decoration:none;}
  .editBtn,.delBtn{border:1.5px solid var(--line);background:#fff;padding:6px 11px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
  .delBtn{color:#c0392b;border-color:#f0c9c3;}

  /* ---------- Staff form modal ---------- */
  .formGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .formGrid .full{grid-column:1/-1;}
  .formGrid label{font-size:11px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:3px;}
  .formGrid input, .formGrid select, .formGrid textarea{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:7px 9px;font-size:13px;font-family:inherit;}
  .formGrid textarea{resize:vertical;min-height:50px;}
  .saveBtn{background:var(--orange);border:none;color:#fff;padding:9px 18px;border-radius:999px;font-weight:800;font-size:13px;cursor:pointer;}
  .cancelBtn{background:#fff;border:1.5px solid var(--line);padding:9px 16px;border-radius:999px;font-weight:700;font-size:13px;cursor:pointer;}

  .emptyMsg{display:none;text-align:center;padding:50px 20px;color:var(--grey);font-size:14px;}
  footer{background:var(--dark);color:#cabba8;font-size:12px;padding:22px 24px;text-align:center;line-height:1.6;}
  footer b{color:#fff;}
  input#importFile{display:none;}

  @media (max-width:900px){
    .weekGrid{grid-template-columns:1fr;}
    .monthGrid,.monthHeadRow{grid-template-columns:repeat(7,minmax(70px,1fr));overflow-x:auto;}
  }

  /* ---------- Printable month poster ---------- */
  #printArea{display:none;}
  .posterHead{text-align:center;margin-bottom:14px;}
  .posterBrand{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--orange);}
  .posterCampus{font-size:26px;font-weight:800;margin-top:2px;}
  .posterMonth{font-size:16px;font-weight:700;color:var(--grey);margin-top:2px;}
  .posterNote{font-size:11.5px;color:var(--grey);margin-top:4px;}
  .posterGridHead{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
  .posterGridHead div{text-align:center;font-size:10.5px;font-weight:800;text-transform:uppercase;color:#fff;background:var(--dark);padding:4px 0;border-radius:4px;}
  .posterGrid{display:flex;flex-direction:column;gap:4px;}
  .printWeekRow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .printCell{border:1px solid var(--line);border-radius:6px;padding:4px 5px;min-height:70px;font-size:9.5px;}
  .printCell.outside{opacity:.35;}
  .printCell.weekend{background:#fdf3e2;}
  .pdnum{font-weight:800;font-size:10px;margin-bottom:2px;}
  .pdhol{color:var(--holiday);font-weight:700;font-size:9px;margin-bottom:2px;}
  .pdact{margin-bottom:2px;line-height:1.25;}
  .pdact.flag{font-weight:800;color:var(--maroon);}
  .posterFoot{text-align:center;font-size:10px;color:var(--grey);margin-top:14px;}

  @media print {
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{display:block !important;position:absolute;left:0;top:0;width:100%;padding:16px;}
  }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <div>
      <div class="brand">Lexis English · Travel Discovery Series</div>
      <h1>Activity Calendar</h1>
      <div class="sub">Sep 2026 – Apr 2027 · Weekly classroom activities + monthly flagship weekend trips, all six campuses</div>
    </div>
    <div class="headerBtns">
      <button class="studentToggle" id="studentToggleBtn">🎓 Student Log In</button>
      <button class="staffToggle" id="staffToggleBtn">🔒 Staff Sign In</button>
    </div>
  </div>
</header>

<div class="blurbBar" id="blurbBar"></div>

<div class="staffBar" id="staffBar">
  <div class="staffBar-inner">
    <span class="tag">Staff Mode</span>
    <button class="sbtn primary" id="addActivityBtn">+ Add Activity</button>
    <button class="sbtn" id="uploadPosterBtn">📎 Upload Month Poster (PDF/Image)</button>
    <button class="sbtn" id="exportHtmlBtn">⬇ Export Updated Calendar (.html)</button>
    <button class="sbtn" id="exportJsonBtn">⬇ Export Data (.json)</button>
    <button class="sbtn" id="importJsonBtn">⬆ Import Data (.json)</button>
    <input type="file" id="importFile" accept="application/json">
    <button class="sbtn" id="resetDataBtn">↺ Reset to Original</button>
    <span style="margin-left:auto;font-size:11.5px;opacity:.8;">Changes save to this browser only until exported &amp; re-shared.</span>
  </div>
</div>

<div class="controlbar">
  <div class="controlbar-inner">
    <div class="row">
      <div class="viewToggle">
        <button id="weekViewBtn" class="active">Week</button>
        <button id="monthViewBtn">Month</button>
      </div>
      <div class="navbar">
        <button class="navBtn" id="prevBtn">‹</button>
        <div class="periodLabel" id="periodLabel"></div>
        <button class="navBtn" id="nextBtn">›</button>
      </div>
      <button class="todayBtn" id="todayBtn">Start of term</button>
      <button class="todayBtn" id="printMonthBtn">🖨️ Print / Save PDF — This Month</button>
      <span class="resultCount" id="resultCount"></span>
    </div>
    <div class="row" id="campusRow">
      <span class="label">Campus</span>
    </div>
    <div class="row">
      <input id="search" type="text" placeholder="Search activities…">
      <button class="toggleBtn" id="myOnlyBtn">★ My activities only</button>
    </div>
  </div>
</div>

<main>
  <div id="calendarRoot"></div>
  <div class="emptyMsg" id="emptyMsg">No activities match your filters.</div>
</main>

<!-- Detail / Attend modal -->
<div class="overlay" id="detailOverlay">
  <div class="modal" id="detailModal"></div>
</div>

<!-- Staff Add/Edit form modal -->
<div class="overlay" id="formOverlay">
  <div class="modal" id="formModal"></div>
</div>

<!-- Student log in / please-log-in prompt modal -->
<div class="overlay" id="loginOverlay">
  <div class="modal" id="loginModal"></div>
</div>

<!-- Print-only poster area -->
<div id="printArea"></div>

<script>
const ORIGINAL_HTML = document.documentElement.outerHTML;

/* ============================================================
   LOAD DATA (localStorage overrides baseline if present)
   ============================================================ */
const BASELINE = JSON.parse(document.getElementById("calendar-data").textContent);
const LS_DATA_KEY = "lexisCalendarData_v2";
const LS_ATTEND_KEY = "lexisCalendarAttending_v2";
const LS_STUDENT_KEY = "lexisCalendarStudent_v1";
const STAFF_PIN = "LEXIS2026";
function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }

const DEFAULT_BLURB = "Welcome to your Lexis English Activity Calendar! Every week each campus runs free conversation, grammar, and job-readiness workshops, plus social activities Tuesday–Friday — and once a month we run a flagship weekend trip through Lexis Travel Discovery. Browse by Week or Month, click any activity for details, and hit Attend to RSVP. Remember to sign in at reception before you head off! Staff: use Staff Mode below to add, edit, or update what students see.";

function loadData(){
  try{
    const saved = JSON.parse(localStorage.getItem(LS_DATA_KEY));
    if (saved && saved.recurring && saved.dated){
      return {
        recurring: saved.recurring,
        dated: saved.dated,
        posters: saved.posters || {},
        blurb: saved.blurb !== undefined ? saved.blurb : (BASELINE.blurb || DEFAULT_BLURB),
      };
    }
  }catch(e){}
  return {
    recurring: deepClone(BASELINE.recurring),
    dated: deepClone(BASELINE.dated),
    posters: deepClone(BASELINE.posters || {}),
    blurb: BASELINE.blurb || DEFAULT_BLURB,
  };
}
function saveData(){
  localStorage.setItem(LS_DATA_KEY, JSON.stringify({ recurring: DATA.recurring, dated: DATA.dated, posters: DATA.posters||{}, blurb: DATA.blurb }));
}

let DATA = loadData();
const CAMPUSES = BASELINE.campuses;
const HOLIDAYS = BASELINE.holidays;
const campusById = Object.fromEntries(CAMPUSES.map(c=>[c.id,c]));
const holidayByDate = Object.fromEntries(HOLIDAYS.map(h=>[h.date,h]));

function loadAttending(){ try{ return JSON.parse(localStorage.getItem(LS_ATTEND_KEY)) || {}; }catch(e){ return {}; } }
function saveAttending(){ localStorage.setItem(LS_ATTEND_KEY, JSON.stringify(ATTENDING)); }
let ATTENDING = loadAttending();

/* ============================================================
   DATE HELPERS
   ============================================================ */
const DAY_NAMES = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DAY_NAMES_FULL = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function parseISO(s){ const [y,m,d] = s.split("-").map(Number); return new Date(Date.UTC(y,m-1,d)); }
function iso(d){ return d.toISOString().slice(0,10); }
function addDays(d,n){ const r = new Date(d); r.setUTCDate(r.getUTCDate()+n); return r; }
function mondayOf(d){ const day = d.getUTCDay(); const diff = (day===0?-6:1-day); return addDays(d,diff); }
function dayIndexMon0(d){ const day = d.getUTCDay(); return day===0?6:day-1; }

const VIEW_START = parseISO(BASELINE.meta.viewStart);
const VIEW_END = parseISO(BASELINE.meta.viewEnd);

let viewMode = "week";
let currentMonday = new Date(VIEW_START);
let currentMonthFirst = new Date(Date.UTC(2026,8,1)); // Sep 2026

/* When embedded on a single campus page (e.g. <iframe src="calendar.html?campus=byron">),
   lock the whole tool to that one campus and hide the campus-switch chips entirely. */
const URL_PARAMS = new URLSearchParams(location.search);
const LOCKED_CAMPUS = URL_PARAMS.get("campus");
const CAMPUS_LOCKED = !!(LOCKED_CAMPUS && campusById[LOCKED_CAMPUS]);

let activeCampuses = CAMPUS_LOCKED ? new Set([LOCKED_CAMPUS]) : new Set(CAMPUSES.map(c=>c.id));
let searchTerm = "";
let myOnly = false;
let staffMode = false;

/* Student login (demo only — this is a self-contained offline file with no
   real backend/auth. "Logged in" just means a name was entered and stored
   in this browser's localStorage; it's a UX gate, not real authentication. */
function loadStudent(){ try{ return JSON.parse(localStorage.getItem(LS_STUDENT_KEY)) || null; }catch(e){ return null; } }
function saveStudent(rec){ localStorage.setItem(LS_STUDENT_KEY, JSON.stringify(rec)); }
function clearStudent(){ localStorage.removeItem(LS_STUDENT_KEY); }
let studentRec = loadStudent();
let studentMode = !!studentRec;
let editingId = null; // for staff form

/* ============================================================
   CONTROL BAR: campus chips
   ============================================================ */
const campusRow = document.getElementById("campusRow");
const allChip = document.createElement("button");
allChip.className = "chip active";
allChip.textContent = "All campuses";
allChip.onclick = () => { activeCampuses = new Set(CAMPUSES.map(c=>c.id)); refreshCampusChips(); render(); };
campusRow.appendChild(allChip);
CAMPUSES.forEach(c=>{
  const chip = document.createElement("button");
  chip.className = "chip campus-chip active";
  chip.dataset.id = c.id;
  chip.innerHTML = `<span class="dot" style="background:${c.color}"></span>${c.name}`;
  chip.onclick = () => {
    // Single-select: clicking a campus shows only that campus.
    // Clicking the already-sole-selected campus again returns to "All campuses".
    const isOnlyThisOne = activeCampuses.size===1 && activeCampuses.has(c.id);
    activeCampuses = isOnlyThisOne ? new Set(CAMPUSES.map(x=>x.id)) : new Set([c.id]);
    refreshCampusChips(); render();
  };
  campusRow.appendChild(chip);
});
function refreshCampusChips(){
  allChip.classList.toggle("active", activeCampuses.size===CAMPUSES.length);
  document.querySelectorAll(".campus-chip").forEach(chip=>{
    const on = activeCampuses.has(chip.dataset.id);
    const col = campusById[chip.dataset.id].color;
    chip.classList.toggle("active", on);
    chip.style.background = on ? col : "#fff";
    chip.style.borderColor = on ? col : "var(--line)";
    chip.style.color = on ? "#fff" : "var(--dark)";
  });
}
refreshCampusChips();

if (CAMPUS_LOCKED){
  // Single-campus embed: hide the whole campus-switch row, no point showing chips for one option.
  campusRow.style.display = "none";
  const lockedName = campusById[LOCKED_CAMPUS].name;
  const h1El = document.querySelector("header.hero h1");
  const subEl = document.querySelector("header.hero .sub");
  if (h1El) h1El.textContent = lockedName + " Activity Calendar";
  if (subEl) subEl.textContent = "Sep 2026 – Apr 2027 · Weekly classroom activities + monthly flagship weekend trips at Lexis " + lockedName;
}

document.getElementById("search").addEventListener("input", e=>{ searchTerm = e.target.value.trim().toLowerCase(); render(); });
const myOnlyBtn = document.getElementById("myOnlyBtn");
myOnlyBtn.addEventListener("click", ()=>{ myOnly = !myOnly; myOnlyBtn.classList.toggle("on", myOnly); render(); });

/* ============================================================
   VIEW TOGGLE + NAV
   ============================================================ */
const weekViewBtn = document.getElementById("weekViewBtn");
const monthViewBtn = document.getElementById("monthViewBtn");
weekViewBtn.onclick = ()=>{ viewMode="week"; weekViewBtn.classList.add("active"); monthViewBtn.classList.remove("active"); render(); };
monthViewBtn.onclick = ()=>{ viewMode="month"; monthViewBtn.classList.add("active"); weekViewBtn.classList.remove("active"); render(); };

document.getElementById("prevBtn").onclick = ()=>{
  if (viewMode==="week") currentMonday = addDays(currentMonday,-7);
  else currentMonthFirst = new Date(Date.UTC(currentMonthFirst.getUTCFullYear(), currentMonthFirst.getUTCMonth()-1, 1));
  render();
};
document.getElementById("nextBtn").onclick = ()=>{
  if (viewMode==="week") currentMonday = addDays(currentMonday,7);
  else currentMonthFirst = new Date(Date.UTC(currentMonthFirst.getUTCFullYear(), currentMonthFirst.getUTCMonth()+1, 1));
  render();
};
document.getElementById("todayBtn").onclick = ()=>{
  currentMonday = new Date(VIEW_START);
  currentMonthFirst = new Date(Date.UTC(2026,8,1));
  render();
};

/* ============================================================
   DATA LOOKUP
   ============================================================ */
function matchesFilters(a){
  if (!activeCampuses.has(a.campus)) return false;
  if (myOnly && !ATTENDING[a.id]) return false;
  if (searchTerm){
    const hay = (a.title+" "+(a.location||"")+" "+campusById[a.campus].name).toLowerCase();
    if (!hay.includes(searchTerm)) return false;
  }
  return true;
}
function activitiesForDate(dateStr){
  const d = parseISO(dateStr);
  const dow = dayIndexMon0(d) + 1; // 1=Mon..7=Sun
  const list = [];
  DATA.recurring.forEach(r=>{ if (r.day===dow) list.push({ ...r, date:dateStr, kind:"recurring" }); });
  DATA.dated.forEach(x=>{ if (x.date===dateStr) list.push({ ...x, kind:"dated" }); });
  return list.filter(matchesFilters);
}
function seedCount(id){ let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))>>>0; return 3 + (h%14); }

/* ============================================================
   RENDER: shared card pieces
   ============================================================ */
function miniCardHTML(a){
  const c = campusById[a.campus];
  const isFlag = a.type==="flagship";
  const isOn = !!ATTENDING[a.id];
  return `<div class="miniCard ${isFlag?'flagship':''} ${isOn?'attending':''}" data-open="${a.id}|${a.date}">
    <span class="campusTag" style="background:${c.color}">${c.name}</span>
    <div class="mtitle">${isFlag?"🎒 ":""}${a.title}</div>
    <div class="mtime">${a.time}${a.location?(" · "+a.location):""}</div>
  </div>`;
}
function actChipHTML(a){
  const c = campusById[a.campus];
  const isFlag = a.type==="flagship";
  const isOn = !!ATTENDING[a.id];
  return `<div class="actChip ${isFlag?'flagship':''} ${isOn?'attending':''}" data-open="${a.id}|${a.date}" title="${a.title}">
    <span class="chipCampus" style="background:${c.color}">${c.name}</span>
    <div class="chipTitle">${isFlag?"🎒 ":""}${a.title}</div>
  </div>`;
}

/* ============================================================
   BLURB BANNER
   ============================================================ */
function renderBlurb(){
  const el = document.getElementById("blurbBar");
  if (!DATA.blurb && !staffMode){ el.style.display = "none"; return; }
  el.style.display = "";
  el.innerHTML = `<div class="blurbBar-inner">
    <div class="blurbText" id="blurbTextEl">${(DATA.blurb||"").replace(/\n/g,"<br>")}</div>
    ${staffMode?`<button class="blurbEditBtn" id="blurbEditBtn">✎ Edit blurb</button>`:""}
  </div>`;
  if (staffMode){
    document.getElementById("blurbEditBtn").onclick = ()=>{
      el.innerHTML = `<div class="blurbBar-inner blurbEditWrap">
        <textarea id="blurbTextarea">${DATA.blurb||""}</textarea>
        <div style="display:flex;gap:8px;">
          <button class="sbtn primary" id="blurbSaveBtn">Save</button>
          <button class="sbtn" id="blurbCancelBtn">Cancel</button>
        </div>
      </div>`;
      document.getElementById("blurbSaveBtn").onclick = ()=>{
        DATA.blurb = document.getElementById("blurbTextarea").value;
        saveData(); renderBlurb();
      };
      document.getElementById("blurbCancelBtn").onclick = renderBlurb;
    };
  }
}

/* ============================================================
   MONTH POSTER BANNER (student-facing view/download link)
   ============================================================ */
function posterKey(campusId, y, m){ return campusId + "_" + y + "-" + String(m+1).padStart(2,"0"); }
function posterBannerHTML(){
  if (activeCampuses.size !== 1) return "";
  const campusId = [...activeCampuses][0];
  const y = currentMonthFirst.getUTCFullYear(), m = currentMonthFirst.getUTCMonth();
  const poster = (DATA.posters||{})[posterKey(campusId,y,m)];
  if (!poster) return "";
  return `<div class="posterBanner">📌 The official ${MONTH_NAMES[m]} poster for ${campusById[campusId].name} is available —
    <a href="${poster.dataUrl}" target="_blank" rel="noopener">View</a> ·
    <a href="${poster.dataUrl}" download="${poster.filename}">Download</a></div>`;
}

/* ============================================================
   RENDER: WEEK VIEW
   ============================================================ */
function renderWeek(){
  const root = document.getElementById("calendarRoot");
  const end = addDays(currentMonday,6);
  document.getElementById("periodLabel").textContent =
    `${MONTH_NAMES[currentMonday.getUTCMonth()].slice(0,3)} ${currentMonday.getUTCDate()} – ${MONTH_NAMES[end.getUTCMonth()].slice(0,3)} ${end.getUTCDate()}, ${end.getUTCFullYear()}`;

  let total = 0;
  let html = `<div class="weekGrid">`;
  for (let i=0;i<7;i++){
    const d = addDays(currentMonday,i);
    const ds = iso(d);
    const items = activitiesForDate(ds).sort((a,b)=> (a.type==="flagship") - (b.type==="flagship"));
    total += items.length;
    const hol = holidayByDate[ds];
    html += `<div class="dayCol ${i>=5?'weekend':''}">
      <div class="dayHead">
        <div class="dname">${DAY_NAMES[i]}</div>
        <div class="dnum">${d.getUTCDate()} ${MONTH_NAMES[d.getUTCMonth()].slice(0,3)}</div>
        ${hol?`<div class="holidayRibbon">${hol.label} (${hol.states.join("/")})</div>`:""}
      </div>
      <div class="dayBody">
        ${items.length ? items.map(miniCardHTML).join("") : `<div class="emptyDay">No activities</div>`}
      </div>
    </div>`;
  }
  html += `</div>`;
  root.innerHTML = html;
  document.getElementById("emptyMsg").style.display = total===0 ? "block":"none";
  document.getElementById("resultCount").textContent = `${total} activities this week · ${Object.values(ATTENDING).filter(Boolean).length} you're attending`;
  attachOpenHandlers();
}

/* ============================================================
   RENDER: MONTH VIEW
   ============================================================ */
function renderMonth(){
  const root = document.getElementById("calendarRoot");
  const y = currentMonthFirst.getUTCFullYear(), m = currentMonthFirst.getUTCMonth();
  document.getElementById("periodLabel").textContent = `${MONTH_NAMES[m]} ${y}`;

  const firstOfMonth = new Date(Date.UTC(y,m,1));
  const gridStart = mondayOf(firstOfMonth);
  const lastOfMonth = new Date(Date.UTC(y,m+1,0));
  const gridEnd = addDays(mondayOf(lastOfMonth),6);
  const numWeeks = Math.round((gridEnd-gridStart)/(7*86400000))+1;

  let head = `<div class="monthHeadRow">${DAY_NAMES.map(d=>`<div>${d}</div>`).join("")}</div>`;
  let total = 0;
  let grid = `<div class="monthGrid">`;
  for (let w=0; w<numWeeks; w++){
    for (let i=0;i<7;i++){
      const d = addDays(gridStart, w*7+i);
      const ds = iso(d);
      const outside = d.getUTCMonth()!==m;
      const items = activitiesForDate(ds).sort((a,b)=> (a.type==="flagship") - (b.type==="flagship"));
      if (!outside) total += items.length;
      const hol = holidayByDate[ds];
      const shown = items.slice(0,3);
      const extra = items.length - shown.length;
      grid += `<div class="monthCell ${outside?'outside':''}">
        <div class="cnum">${d.getUTCDate()}${hol?` <span style="color:var(--holiday);font-size:9px;">●</span>`:""}</div>
        <div class="chipRow">
          ${shown.map(actChipHTML).join("")}
          ${extra>0?`<div class="moreChip" data-daylist="${ds}">+${extra} more</div>`:""}
        </div>
      </div>`;
    }
  }
  grid += `</div>`;
  root.innerHTML = posterBannerHTML() + head + grid;
  document.getElementById("emptyMsg").style.display = total===0 ? "block":"none";
  document.getElementById("resultCount").textContent = `${total} activities in ${MONTH_NAMES[m]} · ${Object.values(ATTENDING).filter(Boolean).length} you're attending`;
  attachOpenHandlers();

  root.querySelectorAll("[data-daylist]").forEach(el=>{
    el.onclick = ()=> openDayList(el.dataset.daylist);
  });
}

function openDayList(ds){
  const items = activitiesForDate(ds);
  const d = parseISO(ds);
  const modal = document.getElementById("detailModal");
  modal.innerHTML = `
    <button class="closeX" onclick="closeDetail()">×</button>
    <h2>${DAY_NAMES_FULL[dayIndexMon0(d)]} ${d.getUTCDate()} ${MONTH_NAMES[d.getUTCMonth()]}</h2>
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px;">
      ${items.map(a=>`<div class="miniCard" data-open="${a.id}|${a.date}" style="cursor:pointer;">
        <span class="campusTag" style="background:${campusById[a.campus].color}">${campusById[a.campus].name}</span>
        <div class="mtitle">${a.type==="flagship"?"🎒 ":""}${a.title}</div>
        <div class="mtime">${a.time}${a.location?(" · "+a.location):""}</div>
      </div>`).join("") || "<div style='color:var(--grey);font-size:13px;'>No activities.</div>"}
    </div>`;
  document.getElementById("detailOverlay").classList.add("show");
  attachOpenHandlers(modal);
}

/* ============================================================
   DETAIL MODAL (view / attend / staff edit)
   ============================================================ */
function attachOpenHandlers(scope){
  (scope || document).querySelectorAll("[data-open]").forEach(el=>{
    el.onclick = (ev)=>{ ev.stopPropagation(); const [id,date] = el.dataset.open.split("|"); openDetail(id,date); };
  });
}
function findActivity(id, date){
  const rec = DATA.recurring.find(r=>r.id===id);
  if (rec) return { ...rec, date, kind:"recurring" };
  const dat = DATA.dated.find(x=>x.id===id);
  if (dat) return { ...dat, kind:"dated" };
  return null;
}
window.closeDetail = ()=> document.getElementById("detailOverlay").classList.remove("show");
window.closeForm = ()=> document.getElementById("formOverlay").classList.remove("show");

/* Click the dark backdrop (outside the card) or press Escape to dismiss —
   this never counts as Attending, it just closes the popup. */
document.getElementById("detailOverlay").addEventListener("click", (ev)=>{
  if (ev.target.id === "detailOverlay") closeDetail();
});
document.getElementById("formOverlay").addEventListener("click", (ev)=>{
  if (ev.target.id === "formOverlay") closeForm();
});
document.addEventListener("keydown", (ev)=>{
  if (ev.key !== "Escape") return;
  if (document.getElementById("detailOverlay").classList.contains("show")) closeDetail();
  if (document.getElementById("formOverlay").classList.contains("show")) closeForm();
});

/* ============================================================

   Grouped by theme (not exact title) since the calendar has 380+
   unique activity titles. Blurbs are original write-ups informed by
   real Lexis English activity recaps; photos are real Lexis English
   photos (lexisenglish.com), each one manually opened and visually

   override with a custom photo/blurb per activity via Edit.
   ============================================================ */

    image:"https://lexisenglish.com/wp-content/uploads/2026/05/aa19e62b-55c6-42db-b58a-4074b88185f6.jpg" },

const DEFAULT_ACTIVITY_CONTENT = { label:"Campus Activity", blurb:"One of the regular activities on the Lexis calendar — a relaxed, social way to practise your English, get out of the classroom and make friends from around the world.", image:null };
function getActivityContent(a){
  const cat = ACTIVITY_CATEGORIES.find(c=>c.test.test(a.title)) || DEFAULT_ACTIVITY_CONTENT;
  return {
    label: cat.label,
    blurb: cat.blurb,
    image: (a.image && a.image.trim()) ? a.image.trim() : cat.image,
  };
}

function openDetail(id, date){
  const a = findActivity(id, date);
  if (!a) return;
  const c = campusById[a.campus];
  const isOn = !!ATTENDING[a.id];
  const count = seedCount(a.id) + (isOn?1:0);
  const optsHTML = (a.options||[]).map(o=>`<a class="opt-link" href="${o.url}" target="_blank" rel="noopener">${o.name} ↗</a>`).join("");
  const content = getActivityContent(a);
  const modal = document.getElementById("detailModal");
  modal.innerHTML = `
    <button class="closeX" onclick="closeDetail()">×</button>
    ${content.image?`<div class="detailImgWrap"><img src="${content.image}" alt="${content.label}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`:""}
    <span class="campusTag" style="background:${c.color}">${c.name}</span>
    <span class="catBadge">${content.label}</span>
    <h2>${a.type==="flagship"?"🎒 ":""}${a.title}</h2>
    <div class="meta">${a.location||""}${a.location&&a.time?" · ":""}${a.time||""} · ${date}</div>
    ${content.blurb?`<div class="blurb">${content.blurb}</div>`:""}
    ${a.why?`<div class="desc"><span class="descLabel">Good to know</span>${a.why}</div>`:""}
    ${optsHTML?`<div class="options">${optsHTML}</div>`:""}
    <div class="footerRow">
      <button class="attend-btn ${isOn?'on':''}" id="attendBtnInModal">${isOn?"✓ Attending":((studentMode||staffMode)?"Attend":"🔒 Attend")}</button>
      <span style="font-size:12px;color:var(--grey);">${count} going</span>
      ${a.url?`<a class="book-link" href="${a.url}" target="_blank" rel="noopener">Book →</a>`:""}
      ${staffMode ? `<button class="editBtn" id="editBtnInModal" style="margin-left:auto;">✎ Edit</button><button class="delBtn" id="delBtnInModal">🗑 Delete</button>` : ""}
    </div>
    ${a.source?`<div style="font-size:10.5px;color:#b8a892;margin-top:10px;">${a.source}</div>`:""}
    <div style="font-size:11px;color:#b8a892;margin-top:10px;">Tip: click outside this card, press the × above, or hit Esc to close without changing your Attend status.</div>
  `;
  document.getElementById("attendBtnInModal").onclick = ()=>{
    if (!studentMode && !staffMode){ renderLoginRequiredPrompt(); return; }
    ATTENDING[a.id] = !ATTENDING[a.id]; saveAttending(); openDetail(id,date); renderCurrent();
  };
  if (staffMode){
    document.getElementById("editBtnInModal").onclick = ()=> openForm(a.kind, a.id);
    document.getElementById("delBtnInModal").onclick = ()=>{
      if (!confirm("Delete this activity?")) return;
      if (a.kind==="recurring") DATA.recurring = DATA.recurring.filter(r=>r.id!==a.id);
      else DATA.dated = DATA.dated.filter(x=>x.id!==a.id);
      saveData(); closeDetail(); renderCurrent();
    };
  }
  document.getElementById("detailOverlay").classList.add("show");
}

document.getElementById("importFile").addEventListener("change", (e)=>{
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      if (!parsed.recurring || !parsed.dated) throw new Error("bad shape");
      DATA = { recurring: parsed.recurring, dated: parsed.dated, posters: parsed.posters || DATA.posters || {}, blurb: parsed.blurb !== undefined ? parsed.blurb : DATA.blurb };
      saveData(); renderCurrent();
      alert("Import complete.");
    }catch(err){ alert("Could not read that file — expecting a Lexis Calendar JSON export."); }
  };
  reader.readAsText(file);
  e.target.value = "";
});

  const jsonStr = JSON.stringify(exportData);
  const marker = /(<script id="calendar-data" type="application\/json">)([\s\S]*?)(<\/script>)/;
  const newHtml = ORIGINAL_HTML.replace(marker, (m,p1,p2,p3)=> p1 + jsonStr + p3);
  const blob = new Blob([newHtml], {type:"text/html"});
  triggerDownload(blob, "Lexis Travel Calendar - Updated "+iso(new Date())+".html");
};
function triggerDownload(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

    const title = document.getElementById("f_title").value.trim();
    if (!title){ alert("Title is required."); return; }
    const campus = document.getElementById("f_campus").value;

function monthOptionsList(){
  const opts = [];
  let d = new Date(Date.UTC(2026,8,1));
  const end = new Date(Date.UTC(2027,3,1));
  while (d <= end){
    opts.push({ value: d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,"0"), label: MONTH_NAMES[d.getUTCMonth()]+" "+d.getUTCFullYear() });
    d = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth()+1, 1));
  }
  return opts;
}

      saveData(); closeForm(); renderCurrent();

/* ---------- Print / Save PDF — poster-style single month ---------- */
function buildPrintArea(){
  if (viewMode !== "month" || activeCampuses.size !== 1) return null;
  const campusId = [...activeCampuses][0];
  const c = campusById[campusId];
  const y = currentMonthFirst.getUTCFullYear(), m = currentMonthFirst.getUTCMonth();
  const firstOfMonth = new Date(Date.UTC(y,m,1));
  const gridStart = mondayOf(firstOfMonth);
  const lastOfMonth = new Date(Date.UTC(y,m+1,0));
  const gridEnd = addDays(mondayOf(lastOfMonth),6);
  const numWeeks = Math.round((gridEnd-gridStart)/(7*86400000))+1;

  let rows = "";
  for (let w=0; w<numWeeks; w++){
    rows += `<div class="printWeekRow">`;
    for (let i=0;i<7;i++){
      const d = addDays(gridStart, w*7+i);
      const ds = iso(d);
      const outside = d.getUTCMonth() !== m;
      const items = activitiesForDate(ds).filter(a=>a.campus===campusId);
      const hol = holidayByDate[ds];
      rows += `<div class="printCell ${outside?'outside':''} ${i>=5?'weekend':''}">
        <div class="pdnum">${DAY_NAMES[i]} ${d.getUTCDate()}</div>
        ${hol?`<div class="pdhol">${hol.label}</div>`:""}
        ${items.map(a=>`<div class="pdact ${a.type==='flagship'?'flag':''}">${a.type==='flagship'?'🎒 ':''}${a.title}${a.time?' · '+a.time:''}</div>`).join("")}
      </div>`;
    }
    rows += `</div>`;
  }
  return `
    <div class="posterHead">
      <div class="posterBrand">LEXIS ENGLISH</div>
      <div class="posterCampus" style="color:${c.color}">${c.name} Activity Calendar</div>
      <div class="posterMonth">${MONTH_NAMES[m]} ${y}</div>
      <div class="posterNote">Come to reception to sign in for the activities you would like to join.</div>
    </div>
    <div class="posterGridHead">${DAY_NAMES_FULL.map(d=>`<div>${d}</div>`).join("")}</div>
    <div class="posterGrid">${rows}</div>
    <div class="posterFoot">Follow us: @LexisEnglish · lexis_english &nbsp;|&nbsp; Book weekend trips at mylexis.online/lexis-travel</div>
  `;
}
document.getElementById("printMonthBtn").onclick = ()=>{
  const html = buildPrintArea();
  if (!html){ alert("Switch to Month view and select exactly one campus (click a campus chip) to print a poster for that month."); return; }
  document.getElementById("printArea").innerHTML = html;
  window.print();
};

/* ============================================================
   MAIN RENDER DISPATCH
   ============================================================ */
function renderCurrent(){ renderBlurb(); viewMode==="week" ? renderWeek() : renderMonth(); }
function render(){ renderCurrent(); }

render();
</script>
</body>
</html>
